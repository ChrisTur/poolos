name: Enforce Main PR Source

on:
  pull_request:
    branches:
      - main

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow develop into main
        run: |
          echo "PR source branch: ${{ github.head_ref }}"
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "❌ Only 'develop' can be merged into 'main'. Got: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source branch is develop — OK to merge."
